<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>For Thulshi ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Tangerine:wght@400;700&family=Gloock&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#7a4a5e; --pink:#ff9dc0; --pink-deep:#ff77a9; --rose:#ffc2d8;
    --blush:#ffe3ee; --cream:#fff7fb; --gold:#f6d7b0; --white:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:manipulation}
  body{
    font-family:'Cormorant Garamond',serif;color:var(--ink);
    background:
      radial-gradient(ellipse at 50% -5%, #6e2a47 0%, transparent 55%),
      radial-gradient(ellipse at 15% 20%, #5a2240 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, #7a2e52 0%, transparent 55%),
      linear-gradient(160deg,#3d1730,#511d3a 55%,#2c1024 100%);
    position:relative;user-select:none;-webkit-user-select:none;
  }
  body::after{content:'';position:fixed;inset:0;z-index:60;pointer-events:none;box-shadow:inset 0 0 220px rgba(20,5,15,.55)}
  .glow{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
  .glow.a{width:48vw;height:48vw;background:rgba(255,157,192,.32);top:-12vw;left:50%;transform:translateX(-50%);animation:breathe 9s ease-in-out infinite}
  .glow.b{width:40vw;height:40vw;background:rgba(255,210,228,.28);bottom:-10vw;right:-8vw;animation:breathe 12s ease-in-out infinite reverse}
  .glow.c{width:30vw;height:30vw;background:rgba(255,140,185,.3);top:45%;left:-8vw;animation:breathe 14s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
  #sparkle{position:fixed;inset:0;z-index:2;pointer-events:none}
  canvas#fx{position:fixed;inset:0;z-index:55;pointer-events:none}
  .frame{position:fixed;inset:max(14px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));border:1.5px solid rgba(255,157,192,.4);border-radius:8px;z-index:50;pointer-events:none}
  .frame::before,.frame::after{content:'♡';position:absolute;color:var(--pink);font-size:18px;opacity:.85}
  .frame::before{top:-12px;left:50%;transform:translateX(-50%);background:#3d1730;padding:0 8px}
  .frame::after{bottom:-13px;left:50%;transform:translateX(-50%);background:#2c1024;padding:0 8px}

  .scene{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;opacity:0;pointer-events:none}
  .scene.on{pointer-events:auto}

  /* distinct transitions per scene */
  #count.on{animation:sFade .7s ease forwards}
  #hb.on{animation:sZoom 1s cubic-bezier(.2,.9,.2,1) forwards}
  #nm.on{animation:sUp 1s cubic-bezier(.2,.9,.2,1) forwards}
  #dogscene.on{animation:sFlip 1.1s cubic-bezier(.2,.9,.2,1) forwards}
  #gallery.on{animation:sSlide .9s cubic-bezier(.2,.9,.2,1) forwards}
  #finale.on{animation:sBloom 1.2s cubic-bezier(.2,.9,.2,1) forwards}
  .scene:not(.on){animation:sOut .55s ease forwards}
  @keyframes sFade{from{opacity:0}to{opacity:1}}
  @keyframes sZoom{from{opacity:0;transform:scale(1.25)}to{opacity:1;transform:scale(1)}}
  @keyframes sUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sFlip{from{opacity:0;transform:perspective(900px) rotateY(35deg) scale(.85)}to{opacity:1;transform:perspective(900px) rotateY(0) scale(1)}}
  @keyframes sSlide{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
  @keyframes sBloom{from{opacity:0;transform:scale(.6);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
  @keyframes sOut{to{opacity:0;transform:scale(.96)}}

  /* countdown */
  #count .num{font-family:'Gloock',serif;font-size:clamp(7rem,42vw,20rem);line-height:1;color:var(--white);text-shadow:0 6px 30px rgba(255,119,169,.5),0 0 60px rgba(255,157,192,.6)}
  .pop{animation:pop 1s cubic-bezier(.2,.9,.2,1)}
  @keyframes pop{0%{opacity:0;transform:scale(.2) rotate(-20deg)}40%{opacity:1;transform:scale(1.1) rotate(4deg)}70%{transform:scale(1) rotate(0)}100%{opacity:0;transform:scale(.85)}}
  .ring{position:absolute;width:min(70vw,360px);height:min(70vw,360px);border:2px solid rgba(255,157,192,.5);border-radius:50%;animation:ringpulse 1s ease-out infinite}
  @keyframes ringpulse{from{transform:scale(.6);opacity:.8}to{transform:scale(1.3);opacity:0}}

  /* happy birthday */
  .kicker{font-family:'Tangerine',cursive;font-weight:700;font-size:clamp(1.9rem,7vw,3rem);color:var(--rose);opacity:0;text-shadow:0 2px 14px rgba(0,0,0,.3)}
  .rule{width:0;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:8px 0 10px;border-radius:2px}
  .title{font-family:'Parisienne',cursive;font-size:clamp(3.4rem,16vw,8.5rem);line-height:1.25;color:#fff0f6;text-shadow:0 4px 22px rgba(255,119,169,.85),0 0 50px rgba(255,157,192,.6),0 2px 6px rgba(0,0,0,.35);padding:.15em .12em}
  .title .line{display:block;overflow:visible;padding:.04em 0}
  .title .line span{display:inline-block;opacity:0;transform:translateY(50px) rotate(-5deg)}
  .on .kicker{animation:fade 1s ease forwards .2s}
  .on .rule{animation:grow 1.2s ease forwards .5s}
  .on .l1 span{animation:letterIn 1s cubic-bezier(.2,.9,.2,1) forwards .5s}
  .on .l2 span{animation:letterIn 1s cubic-bezier(.2,.9,.2,1) forwards .75s}
  @keyframes grow{to{width:min(280px,64vw)}}
  @keyframes letterIn{to{opacity:1;transform:translateY(0) rotate(0)}}
  @keyframes fade{to{opacity:1}}

  /* name */
  .pre{font-family:'Tangerine',cursive;font-weight:400;font-size:clamp(2.4rem,9vw,4rem);color:var(--rose);opacity:0;text-shadow:0 2px 14px rgba(0,0,0,.3)}
  .name{font-family:'Parisienne',cursive;font-size:clamp(4.4rem,25vw,12.5rem);line-height:1.18;color:transparent;background:linear-gradient(105deg,#ffb0cf,#ffd9e8 35%,#ffffff 55%,#ffb0cf 80%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 6px 26px rgba(255,119,169,.7));opacity:0;transform:translateY(30px) scale(.9);padding:.12em .14em}
  .on .pre{animation:fade 1.1s ease forwards .2s}
  .on .name{animation:nameIn 1.4s cubic-bezier(.2,.9,.2,1) forwards .6s, shimmer 6s ease-in-out infinite 2s}
  @keyframes nameIn{to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes shimmer{0%,100%{background-position:0 center}50%{background-position:240% center}}
  .hint{margin-top:24px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,3.2vw,1.3rem);color:var(--rose);opacity:0}
  .on .hint{animation:fade 1.4s ease forwards 1.9s, pulse 2.4s ease-in-out infinite 2.7s}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}

  /* dog */
  .dogwrap{cursor:pointer;transform:scale(.7);opacity:0;transition:transform .25s ease}
  .on .dogwrap{animation:dogIn 1.2s cubic-bezier(.2,.9,.2,1) forwards .3s}
  @keyframes dogIn{to{opacity:1;transform:scale(1)}}
  .dogwrap:active{transform:scale(.93)!important}
  .dog{width:min(58vw,270px);height:auto;filter:drop-shadow(0 16px 26px rgba(255,119,169,.35))}
  .dog .ear-l{transform-origin:84px 96px;animation:earwag 2.2s ease-in-out infinite}
  .dog .ear-r{transform-origin:196px 96px;animation:earwag 2.2s ease-in-out infinite .3s}
  .dog .tail{transform-origin:226px 188px;animation:tailwag .55s ease-in-out infinite}
  @keyframes earwag{0%,100%{transform:rotate(0)}50%{transform:rotate(-7deg)}}
  @keyframes tailwag{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
  .bob{animation:bob 2.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .speech{margin-top:16px;font-family:'Parisienne',cursive;font-size:clamp(2.2rem,9vw,3.6rem);color:#ffd9e8;text-shadow:0 2px 18px rgba(255,119,169,.7);opacity:0}
  .on .speech{animation:fade 1.2s ease forwards 1.1s, pulse 2s ease-in-out infinite 2s}
  .tap{margin-top:4px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,2.8vw,1.1rem);letter-spacing:.08em;color:var(--rose);opacity:0}
  .on .tap{animation:fade 1.2s ease forwards 1.5s}

  /* gallery */
  #gallery{justify-content:flex-start;padding-top:max(36px,env(safe-area-inset-top));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .gtitle{font-family:'Parisienne',cursive;font-size:clamp(2.4rem,9vw,4rem);color:#ffd9e8;text-shadow:0 2px 18px rgba(255,119,169,.6);margin:4px 0 2px;line-height:1.25;padding:.08em 0}
  .gsub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--rose);font-size:clamp(1rem,3vw,1.3rem);margin-bottom:24px}
  .cards{display:flex;flex-direction:column;gap:28px;width:100%;max-width:540px;padding-bottom:40px}
  .card{position:relative;border-radius:20px;overflow:hidden;opacity:0;transform:translateY(50px) scale(.94);box-shadow:0 18px 44px rgba(255,119,169,.28),0 0 0 3px rgba(255,255,255,.85),0 0 0 5px rgba(255,157,192,.4)}
  .card.show{animation:cardin 1s cubic-bezier(.2,.9,.2,1) forwards}
  @keyframes cardin{to{opacity:1;transform:translateY(0) scale(1)}}
  .photo{width:100%;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;font-family:'Parisienne',cursive;font-size:2rem;color:rgba(255,255,255,.95);position:relative;background-size:cover;background-position:center}
  .ph0{background:linear-gradient(135deg,#ff9dc0,#ffd1e3)}
  .ph1{background:linear-gradient(135deg,#ffb0cf,#ffe3ee)}
  .ph2{background:linear-gradient(135deg,#ff8db5,#ffc2d8)}
  .ph3{background:linear-gradient(135deg,#ffa6c8,#ffdce9)}
  .quote{position:absolute;left:0;right:0;bottom:0;padding:64px 22px 22px;background:linear-gradient(transparent,rgba(122,40,70,.82));font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.05rem,3.4vw,1.4rem);line-height:1.55;text-align:left;color:#fff}
  .quote b{display:block;font-family:'Parisienne',cursive;font-style:normal;font-weight:400;color:#ffe3ee;font-size:1.5em;margin-top:8px}
  .finishbtn{margin:6px auto 50px;font-family:'Tangerine',cursive;font-weight:700;font-size:1.9rem;color:#fff;background:linear-gradient(120deg,var(--pink-deep),var(--pink));border:none;border-radius:40px;padding:8px 38px;cursor:pointer;box-shadow:0 10px 26px rgba(255,119,169,.45);opacity:0;transition:transform .25s}
  .finishbtn.show{animation:fade 1s ease forwards}
  .finishbtn:active{transform:scale(.95)}

  /* finale */
  #finale{z-index:9}
  #heartCanvas{position:fixed;inset:0;z-index:8}
  .finalmsg{position:relative;z-index:10;font-family:'Parisienne',cursive;font-size:clamp(2.6rem,12vw,5.5rem);color:#fff0f6;text-shadow:0 4px 26px rgba(255,119,169,.9),0 0 60px rgba(255,157,192,.6),0 2px 6px rgba(0,0,0,.3);line-height:1.2;padding:.1em .12em;opacity:0;pointer-events:none}
  #finale.on .finalmsg{animation:fade 2s ease forwards 2.6s}
  .footer{position:fixed;bottom:max(22px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;z-index:11;font-family:'Parisienne',cursive;color:#ffd9e8;text-shadow:0 2px 14px rgba(255,119,169,.6);font-size:1.5rem;opacity:0}
  #finale.on .footer{animation:fade 2s ease forwards 3.6s}

  .replay{position:fixed;top:max(18px,env(safe-area-inset-top));right:max(18px,env(safe-area-inset-right));z-index:58;background:rgba(255,255,255,.12);border:1px solid rgba(255,157,192,.6);color:#ffd9e8;font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 16px;border-radius:30px;cursor:pointer;opacity:0;transition:opacity .6s}
  .replay.show{opacity:.85}
</style>
</head>
<body>
  <div class="glow a"></div><div class="glow b"></div><div class="glow c"></div>
  <canvas id="sparkle"></canvas>
  <div class="frame"></div>

  <section class="scene on" id="count"><div class="ring"></div><div class="num" id="cnum"></div></section>

  <section class="scene" id="hb">
    <div class="kicker">a little wish, just for you</div>
    <div class="rule"></div>
    <h1 class="title">
      <span class="line l1"><span>Happy</span></span>
      <span class="line l2"><span>Birthday</span></span>
    </h1>
  </section>

  <section class="scene" id="nm">
    <div class="pre">My Love,</div>
    <div class="name">Thulshi</div>
    <div class="hint">someone special wants to say hello…</div>
  </section>

  <section class="scene" id="dogscene">
    <div class="dogwrap" id="dogwrap">
      <div class="bob">
      <svg class="dog" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="140" cy="250" rx="70" ry="14" fill="rgba(255,119,169,.25)"/>
        <path class="tail" d="M222 185 q34 -6 40 -30 q-6 28 -34 40 z" fill="#fff" stroke="#ff77a9" stroke-width="3"/>
        <ellipse cx="140" cy="195" rx="70" ry="58" fill="#fff" stroke="#ff77a9" stroke-width="4"/>
        <ellipse cx="140" cy="205" rx="40" ry="34" fill="#ffe3ee"/>
        <ellipse cx="108" cy="246" rx="18" ry="12" fill="#fff" stroke="#ff77a9" stroke-width="4"/>
        <ellipse cx="172" cy="246" rx="18" ry="12" fill="#fff" stroke="#ff77a9" stroke-width="4"/>
        <ellipse class="ear-l" cx="84" cy="120" rx="24" ry="44" fill="#ff9dc0" stroke="#ff77a9" stroke-width="4"/>
        <ellipse class="ear-r" cx="196" cy="120" rx="24" ry="44" fill="#ff9dc0" stroke="#ff77a9" stroke-width="4"/>
        <circle cx="140" cy="108" r="62" fill="#fff" stroke="#ff77a9" stroke-width="4"/>
        <path d="M78 96 q12 -30 40 -34 q-30 14 -34 40 z" fill="#ffc2d8"/>
        <ellipse cx="120" cy="100" rx="6.5" ry="9" fill="#7a4a5e"/>
        <ellipse cx="160" cy="100" rx="6.5" ry="9" fill="#7a4a5e"/>
        <circle cx="122" cy="97" r="2.2" fill="#fff"/>
        <circle cx="162" cy="97" r="2.2" fill="#fff"/>
        <ellipse cx="140" cy="128" rx="26" ry="20" fill="#fff" stroke="#ff77a9" stroke-width="3"/>
        <ellipse cx="140" cy="120" rx="11" ry="9" fill="#ff77a9"/>
        <path d="M140 129 v9 M140 138 q-10 6 -18 2 M140 138 q10 6 18 2" fill="none" stroke="#7a4a5e" stroke-width="3" stroke-linecap="round"/>
        <circle cx="104" cy="120" r="8" fill="#ff9dc0" opacity=".6"/>
        <circle cx="176" cy="120" r="8" fill="#ff9dc0" opacity=".6"/>
        <path d="M140 168 l-7 -8 a5 5 0 1 1 7 -3 a5 5 0 1 1 7 3 z" fill="#ff77a9"/>
      </svg>
      </div>
    </div>
    <div class="speech">tap me ♡</div>
    <div class="tap">a sweet surprise is waiting</div>
  </section>

  <section class="scene" id="gallery">
    <div class="gtitle">My favourite moments</div>
    <div class="gsub">…every single one, with you</div>
    <div class="cards" id="cards"></div>
    <button class="finishbtn" id="finishbtn">see how it ends ♡</button>
  </section>

  <section class="scene" id="finale">
    <canvas id="heartCanvas"></canvas>
    <div class="finalmsg">I love you, always.</div>
    <div class="footer">forever yours ♡</div>
  </section>

  <canvas id="fx"></canvas>
  <button class="replay" id="replay">Replay</button>

/* sparkles */
const sp=document.getElementById('sparkle'),spx=sp.getContext('2d');let glints=[];
function sizeSp(){sp.width=innerWidth;sp.height=innerHeight;glints=Array.from({length:Math.round(innerWidth*innerHeight/8000)},mkG);}
function mkG(){return{x:Math.random()*sp.width,y:Math.random()*sp.height,r:Math.random()*1.6+.4,p:Math.random()*6.28,s:Math.random()*.025+.006,d:Math.random()*.3-.15,c:palette[Math.random()*palette.length|0]};}
sizeSp();addEventListener('resize',sizeSp);
(function shim(){spx.clearRect(0,0,sp.width,sp.height);for(const g of glints){g.p+=g.s;g.y-=g.d;if(g.y<0)g.y=sp.height;const a=Math.abs(Math.sin(g.p));if(a>.15){spx.save();spx.globalAlpha=a*.8;spx.fillStyle=g.c;const r=g.r*(1+a);spx.translate(g.x,g.y);spx.beginPath();spx.moveTo(0,-r*3);spx.lineTo(r*.5,0);spx.lineTo(0,r*3);spx.lineTo(-r*.5,0);spx.moveTo(-r*3,0);spx.lineTo(0,r*.5);spx.lineTo(r*3,0);spx.lineTo(0,-r*.5);spx.fill();spx.restore();}}requestAnimationFrame(shim);})();

/* confetti / fireworks */
const fx=document.getElementById('fx'),ctx=fx.getContext('2d');
function sizeFx(){fx.width=innerWidth;fx.height=innerHeight;}sizeFx();addEventListener('resize',sizeFx);
let parts=[];
function confetti(x,y,n){n=n||120;for(let i=0;i<n;i++){const a=Math.random()*6.28,s=Math.random()*9+3;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,g:.17,life:90+Math.random()*45,t:0,c:palette[Math.random()*palette.length|0],sz:Math.random()*6+2.5,rot:Math.random()*7,vr:(Math.random()-.5)*.4,shape:Math.random()<.5?'r':'h'});}}
function firework(x,y){if(x==null)x=Math.random()*fx.width;if(y==null)y=Math.random()*fx.height*.4+fx.height*.1;const c=palette[Math.random()*palette.length|0],ring=60+Math.random()*22|0;for(let i=0;i<ring;i++){const a=6.28*i/ring,s=Math.random()*2.5+3.5;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:.035,life:75,t:0,c:c,sz:Math.random()*2.2+1.2,rot:0,vr:0,shape:'c',spark:1});}parts.push({x:x,y:y,vx:0,vy:0,g:0,life:14,t:0,c:'#fff',sz:10,rot:0,vr:0,shape:'c',flash:1});}
function drawHeart(g,s){g.beginPath();g.moveTo(0,s*.3);g.bezierCurveTo(0,-s*.1,-s,-s*.1,-s,s*.35);g.bezierCurveTo(-s,s*.7,0,s,0,s*1.1);g.bezierCurveTo(0,s,s,s*.7,s,s*.35);g.bezierCurveTo(s,-s*.1,0,-s*.1,0,s*.3);g.closePath();g.fill();}
(function render(){ctx.clearRect(0,0,fx.width,fx.height);for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.t++;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.rot+=p.vr;const al=Math.max(0,1-p.t/p.life);ctx.save();ctx.globalAlpha=al;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;if(p.spark){ctx.shadowBlur=8;ctx.shadowColor=p.c;}if(p.shape==='r')ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*1.7);else if(p.shape==='h')drawHeart(ctx,p.sz);else{ctx.beginPath();ctx.arc(0,0,p.sz,0,7);ctx.fill();}ctx.restore();if(p.t>p.life||p.y>fx.height+50)parts.splice(i,1);}requestAnimationFrame(render);})();

/* scenes */
function go(id){document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));const el=document.getElementById(id);void el.offsetWidth;el.classList.add('on');}

const cnum=document.getElementById('cnum');
function countdown(){const seq=['3','2','1'];let i=0;(function step(){if(i<seq.length){cnum.textContent=seq[i];cnum.classList.remove('pop');void cnum.offsetWidth;cnum.classList.add('pop');i++;setTimeout(step,1000);}else{go('hb');setTimeout(()=>{let k=0;const iv=setInterval(()=>{firework();if(++k>3)clearInterval(iv);},650);},400);setTimeout(()=>go('nm'),3600);setTimeout(()=>go('dogscene'),7000);}})();}

document.getElementById('dogwrap').addEventListener('click',()=>{confetti(innerWidth*.5,innerHeight*.5,140);buildGallery();go('gallery');});

function buildGallery(){const wrap=document.getElementById('cards');wrap.innerHTML='';moments.forEach((m,idx)=>{const card=document.createElement('div');card.className='card';const photo=document.createElement('div');photo.className='photo '+(m.type==='placeholder'?m.cls:'');if(m.type==='img'){photo.style.backgroundImage='url("'+m.url+'")';photo.textContent='';}else photo.textContent=m.label;const q=document.createElement('div');q.className='quote';q.innerHTML=m.quote+'<b>'+m.sign+'</b>';photo.appendChild(q);card.appendChild(photo);wrap.appendChild(card);setTimeout(()=>card.classList.add('show'),300+idx*420);});const fb=document.getElementById('finishbtn');fb.classList.remove('show');setTimeout(()=>fb.classList.add('show'),400+moments.length*420);}

document.getElementById('finishbtn').addEventListener('click',()=>{go('finale');startHeart();document.getElementById('replay').classList.add('show');});

const hc=document.getElementById('heartCanvas'),hx=hc.getContext('2d');let hp=[],heartRAF;
function heartPoint(t,s,cx,cy){const x=16*Math.pow(Math.sin(t),3);const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);return{x:cx+x*s,y:cy-y*s};}
function startHeart(){hc.width=innerWidth;hc.height=innerHeight;const cx=hc.width/2,cy=hc.height/2,s=Math.min(hc.width,hc.height)/42;const N=200;hp=[];for(let i=0;i<N;i++){const t=6.28*i/N;const tgt=heartPoint(t,s,cx,cy);hp.push({x:Math.random()*hc.width,y:Math.random()*hc.height,tx:tgt.x,ty:tgt.y,c:palette[Math.random()*palette.length|0],sz:Math.random()*2+2});}let frame=0;cancelAnimationFrame(heartRAF);(function loop(){hx.clearRect(0,0,hc.width,hc.height);frame++;for(const p of hp){p.x+=(p.tx-p.x)*.06;p.y+=(p.ty-p.y)*.06;hx.save();hx.globalAlpha=Math.min(1,frame/40);hx.fillStyle=p.c;hx.shadowBlur=14;hx.shadowColor='#ff77a9';hx.beginPath();hx.arc(p.x,p.y,p.sz,0,7);hx.fill();hx.restore();}if(frame===55){for(let k=0;k<5;k++)setTimeout(firework,k*300);}heartRAF=requestAnimationFrame(loop);})();}
addEventListener('resize',()=>{if(document.getElementById('finale').classList.contains('on'))startHeart();});

addEventListener('click',e=>{const t=e.target;if(t.closest('#dogwrap')||t.closest('button'))return;firework(e.clientX,e.clientY);});
document.getElementById('replay').addEventListener('click',()=>location.reload());

window.addEventListener('load',()=>setTimeout(countdown,500));
setTimeout(()=>{if(!cnum.textContent)countdown();},1500);
</script>
</body>
</html>
